<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Web App Lab</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
            padding-top: 100px;
        }

        .container {
            background: white;
            width: 60%;
            margin: auto;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #0078D4;
        }

        p {
            font-size: 18px;
            color: #333;
        }

        .footer {
            margin-top: 20px;
            color: gray;
            font-size: 14px;
        }

        button {
            background-color: #0078D4;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #005fa3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to Azure Web App</h1>

        <p>
            This website is deployed using 
            Azure App Service with GitHub Integration.
        </p>

        <button onclick="showMessage()">
            Click Me
        </button>

        <p id="message"></p>

        <div class="footer">
            Created by Pech Panha
        </div>
    </div>

    <script>
        function showMessage() {
            document.getElementById("message").innerHTML =
                "Deployment Successful 🎉";
        }
    </script>

</body>
</html>
